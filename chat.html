<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NUST FAQ Chatbot</title>
  <style>
    /* ── Tokens ─────────────────────────────────── */
    :root {
      --bg:          #07080d;
      --bg2:         #0c0e1a;
      --surface:     rgba(255,255,255,0.04);
      --surface-hi:  rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.07);
      --border-hi:   rgba(255,255,255,0.13);
      --accent:      #4f8ef7;
      --accent-dim:  rgba(79,142,247,0.15);
      --accent-glow: rgba(79,142,247,0.3);
      --teal:        #38d9c0;
      --teal-dim:    rgba(56,217,192,0.1);
      --text-1:      #eef0f8;
      --text-2:      #8b93a8;
      --text-3:      #484f63;
      --r-sm:        10px;
      --r-md:        16px;
      --r-lg:        22px;
    }

    /* ── Reset ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Ambient ────────────────────────────────── */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .ambient__halo {
      position: absolute; top: -15%; left: 50%;
      transform: translateX(-50%);
      width: 65vw; height: 50vh;
      background: radial-gradient(ellipse, rgba(79,142,247,0.1) 0%, transparent 70%);
      filter: blur(48px);
    }
    .ambient__halo2 {
      position: absolute; bottom: -10%; right: -5%;
      width: 40vw; height: 40vh;
      background: radial-gradient(ellipse, rgba(56,217,192,0.06) 0%, transparent 70%);
      filter: blur(60px);
    }
    .ambient__grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black, transparent);
    }

    /* ── Shell ──────────────────────────────────── */
    .shell {
      position: relative; z-index: 1;
      width: min(740px, 96vw);
      height: min(88vh, 800px);
      display: flex; flex-direction: column;
      border-radius: var(--r-lg);
      background: var(--bg2);
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(79,142,247,0.05),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      animation: shellIn 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes shellIn {
      from { opacity:0; transform: translateY(20px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }
    .header__avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg,#132d5e,#4f8ef7);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(79,142,247,0.25), 0 0 14px rgba(79,142,247,0.15);
    }
    .header__info { flex: 1; min-width: 0; }
    .header__name {
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.01em;
    }
    .header__sub {
      font-size: 11px; color: var(--text-3); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600;
      color: var(--teal);
      background: var(--teal-dim);
      border: 1px solid rgba(56,217,192,0.18);
      border-radius: 20px; padding: 4px 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .badge__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 6px var(--teal);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0.35; }
    }

    /* ── Messages ───────────────────────────────── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px 18px; display: flex;
      flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08); border-radius: 3px;
    }

    /* ── Message rows ───────────────────────────── */
    .msg {
      display: flex; gap: 9px;
      animation: msgIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0);   }
    }
    .msg--user { flex-direction: row-reverse; }

    .msg__av {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 2px;
    }
    .msg--bot  .msg__av { background: linear-gradient(135deg,#132d5e,#4f8ef7); }
    .msg--user .msg__av { background: var(--surface-hi); border: 1px solid var(--border-hi); }

    .msg__body { max-width: 74%; display: flex; flex-direction: column; gap: 3px; }
    .msg--user .msg__body { align-items: flex-end; }

    .msg__bubble {
      padding: 11px 14px;
      font-size: 13.5px; line-height: 1.65;
      word-break: break-word;
    }
    .msg--bot  .msg__bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
    }
    .msg--user .msg__bubble {
      background: linear-gradient(135deg,#18336b,#1d4080);
      border: 1px solid rgba(79,142,247,0.22);
      border-radius: var(--r-md) var(--r-md) 4px var(--r-md);
      color: #cce0ff;
    }

    .msg__meta {
      font-size: 10.5px; color: var(--text-3); padding: 0 4px;
    }

    /* links inside bot bubbles */
    .msg--bot .msg__bubble a {
      color: var(--accent); text-decoration: none;
      border-bottom: 1px solid rgba(79,142,247,0.28);
    }
    .msg--bot .msg__bubble a:hover { border-color: var(--accent); }

    /* latency chip */
    .latency-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--text-3);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px;
      margin-top: 4px;
    }
    .latency-chip svg { width: 9px; height: 9px; opacity: 0.5; }

    /* ── Typing indicator ───────────────────────── */
    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
      width: fit-content;
    }
    .typing__dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-3);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing__dot:nth-child(2) { animation-delay:0.15s; }
    .typing__dot:nth-child(3) { animation-delay:0.3s;  }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0);    background: var(--text-3); }
      30%          { transform:translateY(-5px); background: var(--accent); }
    }

    /* ── Empty state ────────────────────────────── */
    .empty {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; text-align:center; padding:32px;
      pointer-events:none;
      animation: msgIn 0.4s cubic-bezier(0.16,1,0.3,1) both 0.2s;
    }
    .empty__icon { font-size:38px; }
    .empty__title { font-size:17px; font-weight:700; }
    .empty__sub { font-size:12.5px; color:var(--text-2); max-width:300px; line-height:1.6; }

    /* ── Suggestions ────────────────────────────── */
    .suggestions {
      display:flex; flex-wrap:wrap; gap:7px;
      padding: 0 18px 14px;
    }
    .chip {
      font-size:11.5px; padding:5px 11px;
      border-radius:20px;
      border:1px solid var(--border-hi);
      background:var(--surface);
      color:var(--text-2); cursor:pointer;
      transition:all 0.16s; white-space:nowrap;
      font-family: inherit;
    }
    .chip:hover {
      background:var(--accent-dim);
      border-color:rgba(79,142,247,0.3);
      color:var(--text-1);
    }

    /* ── Input bar ──────────────────────────────── */
    .input-bar {
      display:flex; align-items:flex-end; gap:9px;
      padding:12px 16px;
      border-top:1px solid var(--border);
      background:rgba(255,255,255,0.018);
      flex-shrink:0;
    }
    .input-wrap {
      flex:1; display:flex; align-items:flex-end;
      background:var(--surface-hi);
      border:1px solid var(--border-hi);
      border-radius:var(--r-md);
      padding:9px 13px;
      transition:border-color 0.18s, box-shadow 0.18s;
    }
    .input-wrap:focus-within {
      border-color:rgba(79,142,247,0.4);
      box-shadow:0 0 0 3px rgba(79,142,247,0.09);
    }
    textarea {
      flex:1; background:none; border:none; outline:none;
      color:var(--text-1); font-family:inherit; font-size:13.5px;
      line-height:1.5; resize:none; max-height:110px;
      overflow-y:auto;
    }
    textarea::placeholder { color:var(--text-3); }
    textarea::-webkit-scrollbar { width:3px; }
    textarea::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }

    .send-btn {
      width:38px; height:38px; border-radius:var(--r-sm);
      border:none; background:var(--accent); color:#fff;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0;
      transition:background 0.16s, transform 0.1s, box-shadow 0.16s;
      box-shadow:0 4px 14px rgba(79,142,247,0.3);
    }
    .send-btn:hover:not(:disabled) {
      background:#6aa0ff;
      transform:translateY(-1px);
      box-shadow:0 6px 20px rgba(79,142,247,0.45);
    }
    .send-btn:active:not(:disabled) { transform:translateY(0); }
    .send-btn:disabled { background:rgba(79,142,247,0.25); cursor:not-allowed; box-shadow:none; }
    .send-btn svg { width:16px; height:16px; }

    /* ── Footer ─────────────────────────────────── */
    .footer {
      text-align:center; font-size:10.5px; color:var(--text-3);
      padding:6px 0 10px; letter-spacing:0.02em;
    }

    /* ── Error toast ─────────────────────────────── */
    .toast {
      position:fixed; bottom:22px; left:50%;
      transform:translateX(-50%) translateY(70px);
      background:#221212; border:1px solid rgba(255,80,80,0.28);
      color:#ff8080; font-size:12.5px;
      padding:9px 16px; border-radius:var(--r-sm);
      transition:transform 0.28s cubic-bezier(0.16,1,0.3,1);
      z-index:99; pointer-events:none;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="ambient" aria-hidden="true">
  <div class="ambient__halo"></div>
  <div class="ambient__halo2"></div>
  <div class="ambient__grid"></div>
</div>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header__avatar">🎓</div>
    <div class="header__info">
      <div class="header__name">NUST Admissions Assistant</div>
      <div class="header__sub">Admissions · MBBS · Fees · Scholarships · Entry Test</div>
    </div>
    <div class="badge">
      <div class="badge__dot"></div>
      Offline
    </div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages" aria-live="polite">
    <div class="empty" id="emptyState">
      <div class="empty__icon">🏛️</div>
      <div class="empty__title">Ask me anything about NUST.</div>
      <div class="empty__sub">I answer from 73 official FAQs — fully offline, no internet needed.</div>
    </div>
  </div>

  <!-- Suggested chips -->
  <div class="suggestions" id="suggestions">
    <button class="chip">Are there quota seats?</button>
    <button class="chip">MBBS fee structure</button>
    <button class="chip">Age limit for UG?</button>
    <button class="chip">Scholarship info</button>
    <button class="chip">Can ICS students apply?</button>
    <button class="chip">Entry test syllabus</button>
    <button class="chip">Is migration allowed?</button>
    <button class="chip">Where is NSHS?</button>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="inputField"
        placeholder="Ask about admissions, fees, MBBS…"
        rows="1"
        aria-label="Your question"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="footer">NUST FAQ Chatbot &nbsp;·&nbsp; Powered by Qwen + FAISS &nbsp;·&nbsp; 100% Offline</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/chat';

const msgsEl   = document.getElementById('messages');
const inputEl  = document.getElementById('inputField');
const sendBtn  = document.getElementById('sendBtn');
const suggsEl  = document.getElementById('suggestions');
const emptyEl  = document.getElementById('emptyState');
const toastEl  = document.getElementById('toast');

let firstMessage = true;

// ── Auto-resize textarea ─────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
});

// ── Suggestion chips ─────────────────────────────
suggsEl.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.textContent.trim();
    inputEl.dispatchEvent(new Event('input'));
    send();
  });
});

// ── Enter = send, Shift+Enter = newline ──────────
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// ── Helpers ──────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function esc(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkify(str) {
  return str.replace(/(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank" rel="noreferrer">$1</a>');
}

function clearEmpty() {
  if (firstMessage) {
    emptyEl?.remove();
    suggsEl.style.display = 'none';
    firstMessage = false;
  }
}

function scrollBottom() {
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function addMsg(role, html, latencyMs) {
  clearEmpty();
  const isBot = role === 'bot';
  const row = document.createElement('div');
  row.className = `msg msg--${role}`;

  const metaHtml = isBot && latencyMs != null
    ? `<div class="latency-chip">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
           <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
         </svg>
         ${(latencyMs / 1000).toFixed(1)}s
       </div>`
    : `<div class="msg__meta">${now()}</div>`;

  row.innerHTML = `
    <div class="msg__av">${isBot ? '🎓' : '👤'}</div>
    <div class="msg__body">
      <div class="msg__bubble">${html}</div>
      ${metaHtml}
    </div>`;
  msgsEl.appendChild(row);
  scrollBottom();
}

function addTyping() {
  clearEmpty();
  const row = document.createElement('div');
  row.className = 'msg msg--bot'; row.id = 'typingRow';
  row.innerHTML = `
    <div class="msg__av">🎓</div>
    <div class="msg__body">
      <div class="typing">
        <div class="typing__dot"></div>
        <div class="typing__dot"></div>
        <div class="typing__dot"></div>
      </div>
    </div>`;
  msgsEl.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  document.getElementById('typingRow')?.remove();
}

function setLoading(on) {
  sendBtn.disabled = on;
  inputEl.disabled = on;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3500);
}

// ── Core send ────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMsg('user', esc(text));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  addTyping();
  setLoading(true);

  const t0 = performance.now();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const latency = performance.now() - t0;

    removeTyping();
    addMsg('bot', linkify(esc(data.reply || '⚠️ No reply.')), latency);

  } catch (err) {
    removeTyping();
    if (err.message.includes('fetch') || err.message.includes('Failed')) {
      addMsg('bot', '⚠️ Cannot reach server. Is <code>python app.py</code> running?', null);
      showToast('⚠️ Server not running — start it with: python app.py');
    } else {
      addMsg('bot', `⚠️ Error: ${esc(err.message)}`, null);
    }
  } finally {
    setLoading(false);
    inputEl.focus();
  }
}

inputEl.focus();
</script>
</body>
</html>
